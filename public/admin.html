<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luster Looks — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #0f0a06; color: #e8d5b0; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    :root {
      --gold: #c9a96e;
      --dark: #1a1208;
      --border: rgba(201,169,110,.2);
      --card: #1a1208;
      --muted: #6a5a3a;
    }

    /* ── Login Screen ── */
    .login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a1208 0%, #0a0704 100%);
    }
    .login-box {
      background: #1a1208;
      border: 1px solid var(--border);
      padding: 52px 44px;
      width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; letter-spacing: .14em; color: #e8d5b0;
      margin-bottom: 6px;
    }
    .login-sub { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 36px; }
    .login-box input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      color: #e8d5b0; font-family: 'Montserrat', sans-serif; font-size: 13px;
      outline: none; margin-bottom: 12px; letter-spacing: .04em;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box input::placeholder { color: var(--muted); }
    .btn-login {
      width: 100%; padding: 13px;
      background: var(--gold); color: #1a1208;
      border: none; cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-size: 11px;
      letter-spacing: .18em; text-transform: uppercase; font-weight: 700;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .85; }
    .login-error {
      color: #e07070; font-size: 11.5px; margin-top: 12px;
      letter-spacing: .04em; display: none;
    }
    .login-error.visible { display: block; }

    /* ── Admin Panel ── */
    .admin-panel { display: none; }
    .admin-panel.visible { display: block; }

    .admin-header {
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: 18px 36px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: .1em; }
    .admin-header-right { display: flex; gap: 16px; align-items: center; }
    .btn-logout {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 7px 16px; cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
      transition: color .2s, border-color .2s;
    }
    .btn-logout:hover { color: #e8d5b0; border-color: #e8d5b0; }

    .admin-tabs {
      display: flex; gap: 0;
      background: #120d07;
      border-bottom: 1px solid var(--border);
      padding: 0 36px;
    }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      padding: 16px 20px; cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover { color: #e8d5b0; }

    .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--gold); color: #1a1208;
      font-size: 9px; font-weight: 700; min-width: 18px; height: 18px;
      border-radius: 9px; padding: 0 4px; margin-left: 6px;
    }

    .admin-content { padding: 32px 36px; }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 400; margin-bottom: 24px; letter-spacing: .04em;
    }

    /* Stats cards */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      padding: 20px 24px;
    }
    .stat-label { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 400; color: var(--gold); }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left; font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    .data-table td {
      padding: 13px 14px; border-bottom: 1px solid rgba(201,169,110,.08);
      font-size: 12.5px; color: #c8b890; vertical-align: top;
    }
    .data-table tr:hover td { background: rgba(201,169,110,.04); }
    .data-table .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 12px; letter-spacing: .08em; }

    /* Status badge */
    .status-badge {
      display: inline-block; padding: 3px 10px;
      font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
      border-radius: 2px;
    }
    .status-pending { background: rgba(201,169,110,.15); color: var(--gold); }
    .status-confirmed { background: rgba(70,130,80,.2); color: #7ec47e; }
    .status-shipped { background: rgba(70,100,180,.2); color: #8ab0f0; }
    .status-delivered { background: rgba(100,180,100,.2); color: #90e090; }
    .status-cancelled { background: rgba(180,70,70,.2); color: #e09090; }

    select.status-select {
      background: #120d07; border: 1px solid var(--border);
      color: #e8d5b0; padding: 5px 10px; font-family: 'Montserrat', sans-serif;
      font-size: 11px; cursor: pointer; outline: none;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .order-items-list { font-size: 11.5px; color: #9a8a6a; margin-top: 4px; }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 12px; letter-spacing: .08em; }

    @media (max-width: 700px) {
      .admin-content { padding: 20px 16px; }
      .admin-tabs { padding: 0 16px; overflow-x: auto; }
      .admin-header { padding: 14px 16px; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ── Login ── -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-logo">Luster Looks</div>
      <div class="login-sub">Admin Panel</div>
      <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn-login" onclick="login()">Enter</button>
      <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
    </div>
  </div>

  <!-- ── Admin Panel ── -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-header">
      <div class="admin-header-logo">Luster Looks — Admin</div>
      <div class="admin-header-right">
        <button class="btn-logout" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="showTab('orders')">Orders <span class="tab-badge" id="ordersCount">0</span></button>
      <button class="tab-btn" onclick="showTab('contacts')">Contacts <span class="tab-badge" id="contactsCount">0</span></button>
      <button class="tab-btn" onclick="showTab('newsletter')">Newsletter <span class="tab-badge" id="newsletterCount">0</span></button>
    </div>

    <div class="admin-content">

      <!-- Orders Tab -->
      <div class="tab-content active" id="tab-orders">
        <div class="stats-row" id="statsRow">
          <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" id="statTotal">—</div></div>
          <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" id="statPending">—</div></div>
          <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value" id="statRevenue">—</div></div>
        </div>
        <div class="section-title">Orders</div>
        <div id="ordersTable"><div class="loading">Loading...</div></div>
      </div>

      <!-- Contacts Tab -->
      <div class="tab-content" id="tab-contacts">
        <div class="section-title">Contact Submissions</div>
        <div id="contactsTable"><div class="loading">Loading...</div></div>
      </div>

      <!-- Newsletter Tab -->
      <div class="tab-content" id="tab-newsletter">
        <div class="section-title">Newsletter Subscribers</div>
        <div id="newsletterTable"><div class="loading">Loading...</div></div>
      </div>

    </div>
  </div>

  <script>
    let adminToken = sessionStorage.getItem('ll_admin_token') || null;
    const API = window.location.origin;

    // Auto-login if token saved
    if (adminToken) showPanel();

    function login() {
      const pw = document.getElementById('passwordInput').value;
      fetch(`${API}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          adminToken = data.token;
          sessionStorage.setItem('ll_admin_token', adminToken);
          document.getElementById('loginError').classList.remove('visible');
          showPanel();
        } else {
          document.getElementById('loginError').classList.add('visible');
        }
      })
      .catch(() => document.getElementById('loginError').classList.add('visible'));
    }

    function logout() {
      adminToken = null;
      sessionStorage.removeItem('ll_admin_token');
      document.getElementById('adminPanel').classList.remove('visible');
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
    }

    function showPanel() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').classList.add('visible');
      loadAll();
    }

    function showTab(name) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      event.target.classList.add('active');
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'x-admin-token': adminToken };
    }

    function loadAll() {
      loadOrders();
      loadContacts();
      loadNewsletter();
    }

    // ── Orders ──────────────────────────────────────────────
    function loadOrders() {
      fetch(`${API}/api/admin/orders`, { headers: authHeaders() })
        .then(r => r.json())
        .then(orders => {
          document.getElementById('ordersCount').textContent = orders.length;
          document.getElementById('statTotal').textContent = orders.length;
          const pending = orders.filter(o => o.status === 'pending').length;
          document.getElementById('statPending').textContent = pending;
          const revenue = orders
            .filter(o => o.status !== 'cancelled')
            .reduce((s, o) => s + parseFloat(o.total.replace(/[^0-9.]/g, '') || 0), 0);
          document.getElementById('statRevenue').textContent = '$' + revenue.toFixed(2);

          if (orders.length === 0) {
            document.getElementById('ordersTable').innerHTML = '<table class="data-table"><tr><td class="empty">No orders yet.</td></tr></table>';
            return;
          }

          document.getElementById('ordersTable').innerHTML = `
            <table class="data-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                ${orders.map(o => `
                  <tr>
                    <td>${o.id}</td>
                    <td>${o.name}</td>
                    <td>${o.phone}</td>
                    <td>${o.email || '—'}</td>
                    <td>
                      <div class="order-items-list">
                        ${Array.isArray(o.items) ? o.items.map(i => `${i.name} × ${i.qty}`).join('<br>') : o.items}
                      </div>
                    </td>
                    <td>${o.total}</td>
                    <td>
                      <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
                        ${['pending','confirmed','shipped','delivered','cancelled'].map(s =>
                          `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`
                        ).join('')}
                      </select>
                    </td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        });
    }

    function updateStatus(id, status) {
      fetch(`${API}/api/admin/orders/${id}`, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ status })
      }).then(() => loadOrders());
    }

    // ── Contacts ────────────────────────────────────────────
    function loadContacts() {
      fetch(`${API}/api/admin/contacts`, { headers: authHeaders() })
        .then(r => r.json())
        .then(contacts => {
          document.getElementById('contactsCount').textContent = contacts.length;
          if (contacts.length === 0) {
            document.getElementById('contactsTable').innerHTML = '<table class="data-table"><tr><td class="empty">No contact submissions yet.</td></tr></table>';
            return;
          }
          document.getElementById('contactsTable').innerHTML = `
            <table class="data-table">
              <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Message</th><th>Date</th></tr></thead>
              <tbody>
                ${contacts.map(c => `
                  <tr>
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.email}</td>
                    <td>${c.phone || '—'}</td>
                    <td style="max-width:260px">${c.message || '—'}</td>
                    <td>${new Date(c.created_at).toLocaleDateString()}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        });
    }

    // ── Newsletter ──────────────────────────────────────────
    function loadNewsletter() {
      fetch(`${API}/api/admin/newsletter`, { headers: authHeaders() })
        .then(r => r.json())
        .then(subs => {
          document.getElementById('newsletterCount').textContent = subs.length;
          if (subs.length === 0) {
            document.getElementById('newsletterTable').innerHTML = '<table class="data-table"><tr><td class="empty">No subscribers yet.</td></tr></table>';
            return;
          }
          document.getElementById('newsletterTable').innerHTML = `
            <table class="data-table">
              <thead><tr><th>#</th><th>Email</th><th>Date Subscribed</th></tr></thead>
              <tbody>
                ${subs.map(s => `
                  <tr>
                    <td>${s.id}</td>
                    <td>${s.email}</td>
                    <td>${new Date(s.created_at).toLocaleDateString()}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        });
    }
  </script>
</body>
</html>
